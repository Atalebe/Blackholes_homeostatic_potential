run:
  run_name: obs_gama_rebuilt_oiiibH_sigmaS
  seed: 12345

data:
  runtime_table: outputs/tables/gama_sample_runtime_table.csv

columns:
  gal_id: gal_id
  logMstar: logMstar_gama
  SFR: SFR
  logMbh: logMbh
  mdot_bh: mdot_bh
  z: z_gama
  sigma_star: sigma_star_gama
  h_col: OIIIB_FLUX
  extras:
    - SPECID
    - SN
    - NQ
    - SurfaceDensity
    - OIIIB_FLUX
    - HB_FLUX
    - D4000N
  sn_col: SN
  nq_col: NQ

selection:
  z_max: 0.1
  host_mass_log10_min: 10.4
  host_mass_log10_max: 11.2
  require_positive_sfr: true
  require_positive_mdot_bh: true
  require_positive_sigma: true
  require_positive_logMstar: true
  require_finite_logMbh: true
  require_positive_h_source: true
  sn_min: 3
  nq_min: 3

h_definition:
  mode: log10_col

s_definition:
  mode: sigma_offset

bh_sigma_relation:
  a: 8.32
  b: 5.64
  sigma_norm_kms: 200.0

class_conditioning:
  bh_mass_bins:
    - [6.0, 7.0]
    - [7.0, 8.0]
    - [8.0, 9.0]

window:
  q_low: 0.35
  q_high: 0.65

variance_scaling:
  bin_start: 6.0
  bin_stop: 9.0
  bin_step: 1.0
  min_bin_count: 8

nulls:
  n_perm: 2000

outputs:
  catalog_out: outputs/catalogs/obs_gama_rebuilt_oiiibH_sigmaS.parquet
  window_catalog_out: outputs/catalogs/obs_gama_rebuilt_oiiibH_sigmaS_window.parquet
  qc_summary_out: outputs/tables/obs_gama_rebuilt_oiiibH_sigmaS_qc.csv
  variance_table_out: outputs/tables/obs_gama_rebuilt_oiiibH_sigmaS_variance_scaling.csv
  variance_summary_out: outputs/tables/obs_gama_rebuilt_oiiibH_sigmaS_variance_summary.csv
  null_slopes_out: outputs/tables/obs_gama_rebuilt_oiiibH_sigmaS_null_slopes.csv
  figure_prefix: outputs/figures/obs_gama_rebuilt_oiiibH_sigmaS
