run:
  run_name: obs_gama_from_csv_coarse
  seed: 12345

data:
  input_csv: data/raw/obs/obs_mw_homeostasis_input_gama_dr4_v1.csv

selection:
  z_max: 0.1
  host_mass_log10_min: 10.4
  host_mass_log10_max: 11.2
  require_positive_sfr: true
  require_positive_mdot_bh: true
  lambda0_band_low: -5.0
  lambda0_band_high: 3.0

class_conditioning:
  bh_mass_bins:
    - [6.0, 7.0]
    - [7.0, 8.0]
    - [8.0, 9.0]

window:
  q_low: 0.35
  q_high: 0.65

variance_scaling:
  bin_start: 6.0
  bin_stop: 9.0
  bin_step: 1.0
  min_bin_count: 8

nulls:
  n_perm: 2000

outputs:
  catalog_out: outputs/catalogs/obs_gama_static_coarse.parquet
  window_catalog_out: outputs/catalogs/obs_gama_static_window_coarse.parquet
  variance_table_out: outputs/tables/obs_gama_variance_scaling_coarse.csv
  variance_summary_out: outputs/tables/obs_gama_variance_summary_coarse.csv
  null_slopes_out: outputs/tables/obs_gama_null_slopes_coarse.csv
  figure_prefix: outputs/figures/obs_gama_coarse
