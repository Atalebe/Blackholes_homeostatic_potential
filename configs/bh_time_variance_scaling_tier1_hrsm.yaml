run:
  run_name: bh_time_variance_scaling_tier1_hrsm
  seed: 12345

data:
  bh_level_csv: outputs/tables/bh_time_ripeness_from_csv_tier1_hrsm.csv

variance_scaling:
  x: log10_mbh_final
  y: track_median_phi
  bin_start: 5.5
  bin_stop: 8.5
  bin_step: 0.5
  min_bin_count: 20

nulls:
  n_perm: 2000
  shuffle_within: category

outputs:
  variance_table_out: outputs/tables/bh_time_variance_scaling_tier1_hrsm.csv
  variance_summary_out: outputs/tables/bh_time_variance_summary_tier1_hrsm.csv
  null_slopes_out: outputs/tables/bh_time_null_slopes_tier1_hrsm.csv
  figure_prefix: outputs/figures/bh_time_tier1_hrsm
