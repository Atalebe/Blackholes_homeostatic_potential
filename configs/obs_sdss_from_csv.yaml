run:
  run_name: obs_sdss_from_csv
  seed: 12345

data:
  input_csv: data/raw/obs/obs_mw_homeostasis_input_sdss_v1.csv

selection:
  z_max: 0.1
  host_mass_log10_min: 10.4
  host_mass_log10_max: 11.2
  require_positive_sfr: true
  require_positive_mdot_bh: true
  lambda0_band_low: -5.0
  lambda0_band_high: 3.0

class_conditioning:
  bh_mass_bins:
    - [5.0, 6.0]
    - [6.0, 7.0]
    - [7.0, 8.0]
    - [8.0, 9.0]

window:
  q_low: 0.35
  q_high: 0.65

variance_scaling:
  bin_start: 5.0
  bin_stop: 9.0
  bin_step: 0.5
  min_bin_count: 30

nulls:
  n_perm: 2000

outputs:
  catalog_out: outputs/catalogs/obs_sdss_static.parquet
  window_catalog_out: outputs/catalogs/obs_sdss_static_window.parquet
  variance_table_out: outputs/tables/obs_sdss_variance_scaling.csv
  variance_summary_out: outputs/tables/obs_sdss_variance_summary.csv
  null_slopes_out: outputs/tables/obs_sdss_null_slopes.csv
  figure_prefix: outputs/figures/obs_sdss
