schema_version: 1
run_id: BH-MEMORY-GENERATOR3-PHASEB-001
seed: 12345

data:
  candidate_parquet: outputs/protocol/memory_generator3/bh_memory_generator3_candidates.parquet
  phase_a_verdict: outputs/protocol/memory_generator3/bh_memory_generator3_phase_a_verdict.json

columns:
  id: bh_id
  split: split
  target: lambda_next
  current: lambda_current
  delta_time: delta_u_next
  category: category
  mass_class: final_mass_class

selection:
  tau_track_fractions: [0.02, 0.05, 0.10, 0.20]

model:
  family: pooled_linear_ridge
  ridge_alpha: 1.0e-6

bootstrap:
  unit: bh_id
  n_resamples: 2000
  confidence: 0.95

gates:
  minimum_fractional_test_improvement: 0.01

outputs:
  root: outputs/protocol/memory_generator3
