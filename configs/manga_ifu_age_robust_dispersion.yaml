run:
  run_name: manga_ifu_age_robust_dispersion
  seed: 12345

data:
  input_table: outputs/tables/manga_ifu_age_state_vector.csv

variance_scaling:
  x: logMstar_drp_elpetro
  bin_start: 10.0
  bin_stop: 11.5
  bin_step: 0.25
  min_bin_count: 3

tests:
  y_cols:
    - phi_ifu
    - H_raw
    - S_raw
  metrics:
    - variance
    - mad2
    - iqr2

nulls:
  n_perm: 2000
  shuffle_within: global

outputs:
  summary_csv: outputs/tables/manga_ifu_age_robust_dispersion_summary.csv
  binned_csv: outputs/tables/manga_ifu_age_robust_dispersion_binned.csv
