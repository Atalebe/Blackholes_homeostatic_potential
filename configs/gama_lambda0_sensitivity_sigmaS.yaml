run:
  run_name: gama_lambda0_sensitivity_sigmaS
  seed: 12345

data:
  runtime_table: outputs/tables/gama_sample_runtime_table.csv

columns:
  gal_id: gal_id
  logMstar: logMstar_gama
  SFR: SFR
  logMbh: logMbh
  mdot_bh: mdot_bh
  z: z_gama
  sigma_star: sigma_star_gama
  sn_col: SN
  nq_col: NQ

selection:
  z_max: 0.1
  host_mass_log10_min: 10.4
  host_mass_log10_max: 11.2
  require_positive_sfr: true
  require_positive_mdot_bh: true
  require_positive_sigma: true
  require_positive_logMstar: true
  lambda0_band_low: -5.0
  sn_min: 3
  nq_min: 3

bh_sigma_relation:
  a: 8.32
  b: 5.64
  sigma_norm_kms: 200.0

class_conditioning:
  bh_mass_bins:
    - [6.0, 7.0]
    - [7.0, 8.0]
    - [8.0, 9.0]

window:
  q_low: 0.35
  q_high: 0.65

variance_scaling:
  bin_start: 6.0
  bin_stop: 9.0
  bin_step: 1.0
  min_bin_count: 8

nulls:
  n_perm: 2000
  shuffle_within: bh_mass_class

sweep:
  lambda0_upper_bounds: [3.0, 10.0, 20.0, 30.0, 50.0]

outputs:
  summary_csv: gama_lambda0_sensitivity_sigmaS_summary.csv
  binned_csv: gama_lambda0_sensitivity_sigmaS_binned.csv
  figure_retention: gama_lambda0_sensitivity_sigmaS_retention.png
  figure_slope: gama_lambda0_sensitivity_sigmaS_slope.png
